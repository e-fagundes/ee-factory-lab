<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">EE Factory Lab platform flow</title>
  <desc id="desc">Internal Developer Platform flow for governed Ansible Execution Environment creation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#12352e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9bdacb"/>
    </marker>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="70" y="88" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="800">EE Factory Lab</text>
  <text x="70" y="126" fill="#b9d7cf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22">A local IDP pattern for purpose-driven Ansible Execution Environments</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="220" height="150" rx="12" fill="#f8fafc"/>
    <text x="96" y="235" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Request</text>
    <text x="96" y="270" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Domain, purpose,</text>
    <text x="96" y="294" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">base image, versions,</text>
    <text x="96" y="318" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">dependencies</text>

    <rect x="350" y="190" width="220" height="150" rx="12" fill="#f8fafc"/>
    <text x="376" y="235" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Guardrails</text>
    <text x="376" y="270" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Pinned collections,</text>
    <text x="376" y="294" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">domain taxonomy,</text>
    <text x="376" y="318" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">base image policy</text>

    <rect x="630" y="190" width="220" height="150" rx="12" fill="#f8fafc"/>
    <text x="656" y="235" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Generate</text>
    <text x="656" y="270" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">EE definition,</text>
    <text x="656" y="294" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">requirements, reports,</text>
    <text x="656" y="318" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">README</text>

    <rect x="910" y="190" width="220" height="150" rx="12" fill="#f8fafc"/>
    <text x="936" y="235" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Approve</text>
    <text x="936" y="270" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Human review before</text>
    <text x="936" y="294" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">build and before</text>
    <text x="936" y="318" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">publish</text>

    <rect x="1190" y="190" width="140" height="150" rx="12" fill="#f8fafc"/>
    <text x="1216" y="235" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Publish</text>
    <text x="1216" y="270" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Quay.io</text>
    <text x="1216" y="294" fill="#40516a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">after gate</text>
  </g>

  <g stroke="#9bdacb" stroke-width="4" marker-end="url(#arrow)" fill="none">
    <path d="M290 265 H342"/>
    <path d="M570 265 H622"/>
    <path d="M850 265 H902"/>
    <path d="M1130 265 H1182"/>
  </g>

  <rect x="210" y="430" width="980" height="180" rx="16" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"/>
  <text x="250" y="480" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="800">Llama assists the reviewer, not the policy engine</text>
  <text x="250" y="522" fill="#b9d7cf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">It explains findings, suggests questions, and drafts documentation.</text>
  <text x="250" y="554" fill="#b9d7cf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Guardrails, vulnerability checks, and approval gates remain deterministic.</text>
  <text x="250" y="586" fill="#b9d7cf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">That is the difference between useful assistance and letting a chatbot drive production policy.</text>

  <text x="70" y="700" fill="#9bdacb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Small EEs. Declared domains. Versioned builds. Reviewable publication.</text>
</svg>
