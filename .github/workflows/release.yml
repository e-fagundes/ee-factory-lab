name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: tar --exclude='.git' -czf ee-factory-lab.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: ee-factory-lab
          path: ee-factory-lab.tar.gz
