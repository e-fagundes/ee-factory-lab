apiVersion: apps/v1
kind: Deployment
metadata:
  name: ee-factory-api
  namespace: ee-factory-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ee-factory-api
  template:
    metadata:
      labels:
        app: ee-factory-api
    spec:
      serviceAccountName: ee-factory-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/builds /data/metadata && chown -R 10001:10001 /data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: api
          image: ee-factory-lab/api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ee-factory-secrets
                  key: database-url
            - name: DATA_DIR
              value: /data
            - name: VULNERABILITY_SCAN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: VULNERABILITY_SCAN_ENABLED
            - name: VULNERABILITY_SCAN_REQUIRED
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: VULNERABILITY_SCAN_REQUIRED
            - name: OSV_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: OSV_API_BASE_URL
            - name: OLLAMA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: OLLAMA_ENABLED
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ee-factory-config
                  key: OLLAMA_MODEL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ee-factory-data
